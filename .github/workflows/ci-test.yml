name: swift-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

strategy:
  matrix:
    os: [macos-13, macos-14, macos-15, ubuntu-latest]

jobs:
  swift-build:
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: swift test

